<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Operações · Starken</title>
<style>
  :root{--bg-0:#0a0e1a;--bg-1:#131b2e;--bg-2:#1a2440;--bg-3:#243154;--text-0:#f8fafc;--text-1:#cbd5e1;--text-2:#94a3b8;--text-3:#64748b;--accent:#fbbf24;--ok:#4ade80;--warn:#fbbf24;--err:#f87171;--info:#60a5fa;--purple:#a78bfa;--border:rgba(255,255,255,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--bg-0);}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(180deg,var(--bg-0),var(--bg-1));color:var(--text-0);min-height:100vh;padding:24px 28px 60px;}
  a{color:var(--info);text-decoration:none;}
  .mono{font-variant-numeric:tabular-nums;}
  .muted{color:var(--text-3);}
  .topnav{display:flex;align-items:center;gap:18px;padding:14px 22px;background:rgba(19,27,46,.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:16px;margin-bottom:18px;flex-wrap:wrap;position:sticky;top:12px;z-index:100;}
  .brand{font-weight:800;font-size:18px;background:linear-gradient(90deg,var(--accent),#f59e0b);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
  .brand-sub{color:var(--text-3);font-size:12px;font-weight:500;margin-left:-8px;}
  .nav-links{display:flex;gap:6px;flex-wrap:wrap;margin-left:6px;}
  .nav-links a{padding:6px 12px;border-radius:8px;color:var(--text-1);font-size:13px;font-weight:500;}
  .nav-links a:hover{background:rgba(255,255,255,.05);color:var(--text-0);text-decoration:none;}
  .topnav-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .pill{padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--border);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .pill.ok{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.35);color:var(--ok);}
  .pill.warn{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.35);color:var(--warn);}
  .btn{padding:8px 16px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:#fff;cursor:pointer;font-weight:600;font-size:12px;}
  .btn:hover{opacity:.85;}
  .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
  .tab{padding:8px 15px;border:1px solid var(--border);background:var(--bg-1);color:var(--text-2);font-size:13px;font-weight:600;border-radius:999px;cursor:pointer;}
  .tab.active{background:var(--accent);color:#1a0f08;border-color:var(--accent);}

  /* resumo do cliente */
  .totals{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:8px;}
  @media(min-width:760px){.totals{grid-template-columns:repeat(6,1fr);}}
  .tcard{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:13px 16px;}
  .tcard.hero{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(245,158,11,.04));border-color:rgba(251,191,36,.25);}
  .tl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);font-weight:700;}
  .tv{font-size:21px;font-weight:800;margin-top:4px;}
  .tv.amber{color:var(--accent);}.tv.green{color:var(--ok);}.tv.warn{color:var(--warn);}
  .periodo{font-size:11px;color:var(--text-3);margin:2px 0 16px;}

  /* campanha */
  .camp{background:var(--bg-1);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
  .camp.has-warn{border-color:rgba(251,191,36,.3);}
  .camp-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;}
  .camp-head:hover{background:rgba(255,255,255,.02);}
  .obj{font-size:10px;font-weight:800;padding:3px 9px;border-radius:6px;white-space:nowrap;}
  .obj.OUTCOME_SALES{background:rgba(74,222,128,.15);color:var(--ok);}
  .obj.OUTCOME_AWARENESS{background:rgba(96,165,250,.15);color:var(--info);}
  .obj.OUTCOME_TRAFFIC{background:rgba(167,139,250,.15);color:var(--purple);}
  .obj.other{background:rgba(148,163,184,.15);color:var(--text-2);}
  .camp-name{font-weight:700;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .budget-tag{font-size:11px;color:var(--text-2);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .warn-count{font-size:11px;font-weight:700;color:var(--warn);white-space:nowrap;}
  .st{font-size:9px;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap;}
  .st.ACTIVE{background:rgba(74,222,128,.15);color:var(--ok);}
  .st.PAUSED{background:rgba(148,163,184,.12);color:var(--text-3);}
  .st.IN_REVIEW,.st.PENDING_REVIEW,.st.IN_PROCESS,.st.CAMPAIGN_PAUSED,.st.ADSET_PAUSED{background:rgba(251,191,36,.15);color:var(--warn);}
  .st.WITH_ISSUES,.st.DISAPPROVED{background:rgba(248,113,113,.15);color:var(--err);}
  .chev{color:var(--text-3);transition:transform .15s;}
  .camp.open .chev{transform:rotate(90deg);}

  /* KPI row */
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 18px 14px;}
  @media(min-width:680px){.kpi-row{grid-template-columns:repeat(9,1fr);}}
  .kpi-row.muted{display:block;color:var(--text-3);font-size:12px;}
  .kpi{background:rgba(0,0,0,.18);border:1px solid var(--border);border-radius:8px;padding:7px 9px;text-align:center;}
  .kpi-l{font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);font-weight:700;}
  .kpi-v{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px;}
  .kpi-v.amber{color:var(--accent);}.kpi-v.green{color:var(--ok);}

  .camp-body{display:none;padding:0 18px 14px;border-top:1px solid var(--border);}
  .camp.open .camp-body{display:block;}
  .adset{background:rgba(0,0,0,.16);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-top:12px;}
  .adset-name{font-weight:700;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .flags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .flag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;}
  .flag.ok{background:rgba(74,222,128,.12);color:var(--ok);}
  .flag.warn{background:rgba(248,113,113,.13);color:var(--err);}
  .flag.info{background:rgba(96,165,250,.1);color:var(--info);}
  .targ{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
  .targ-i{font-size:11px;color:var(--text-1);background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:3px 8px;}
  .adset-extra{font-size:11px;color:var(--text-3);margin-bottom:10px;font-variant-numeric:tabular-nums;}

  /* anúncios / criativos */
  .ads-grid{display:grid;grid-template-columns:1fr;gap:10px;}
  @media(min-width:720px){.ads-grid{grid-template-columns:repeat(2,1fr);}}
  .adcard{display:flex;gap:12px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:10px;}
  .adcard.paused{opacity:.55;}
  .adcard-img{width:84px;height:84px;flex-shrink:0;border-radius:8px;overflow:hidden;background:var(--bg-0);border:1px solid var(--border);}
  .adcard-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-3);text-align:center;}
  .adcard-body{flex:1;min-width:0;}
  .adcard-head{display:flex;align-items:center;gap:6px;font-size:12px;flex-wrap:wrap;margin-bottom:4px;}
  .adcard-head b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
  .cust{font-size:9px;font-weight:700;background:rgba(167,139,250,.15);color:var(--purple);padding:2px 6px;border-radius:5px;}
  .ad-title{font-size:11px;font-weight:700;color:var(--text-0);margin-bottom:3px;}
  .ad-copy{font-size:11px;color:var(--text-2);line-height:1.4;max-height:48px;overflow:hidden;cursor:pointer;}
  .ad-copy.open{max-height:none;}
  .ad-meta{display:flex;gap:8px;align-items:center;margin-top:5px;flex-wrap:wrap;}
  .cta{font-size:9px;font-weight:700;background:rgba(74,222,128,.12);color:var(--ok);padding:2px 7px;border-radius:5px;}
  .ad-link{font-size:10px;}
  .ad-kpis{font-size:11px;color:var(--text-1);margin-top:6px;font-variant-numeric:tabular-nums;border-top:1px dashed var(--border);padding-top:6px;}
  .multi-note{font-size:10px;color:var(--text-3);margin-top:10px;font-style:italic;}
  .loading{text-align:center;color:var(--text-2);padding:60px 20px;}
  .empty{color:var(--text-3);padding:30px;text-align:center;}
  .err-banner{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--err);padding:14px 18px;border-radius:12px;}
</style>
</head>
<body>
<nav class="topnav">
  <div><span class="brand">🎛️ Central de Operações</span><span class="brand-sub"> · estrutura + performance</span></div>
  <div class="nav-links">
    <a href="/admin/">🛡️ Admin</a><a href="/admin/monitor.html">📡 Monitor</a><a href="/admin/galeria.html">🖼️ Galeria</a><a href="/agendamentos.html">📅 Agendamentos</a>
  </div>
  <div class="topnav-right">
    <span class="pill" id="pill-updated">⏳</span>
    <button class="btn" onclick="loadClient(CURRENT,true)">↻ Atualizar</button>
  </div>
</nav>
<div class="tabs" id="tabs"></div>
<div id="root"><div class="loading">Carregando clientes…</div></div>

<script>
const $=(s,r=document)=>r.querySelector(s);
let CURRENT=null;
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num=n=>n==null?'—':new Intl.NumberFormat('pt-BR').format(n);
const brl=n=>n==null?'—':'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=n=>n==null?'—':Number(n).toFixed(2).replace('.',',')+'%';
const xx=n=>(n==null||n===0)?'—':Number(n).toFixed(2).replace('.',',')+'×';
const DIAS={0:'Dom',1:'Seg',2:'Ter',3:'Qua',4:'Qui',5:'Sex',6:'Sáb'};
const h=m=>String(Math.floor(m/60)).padStart(2,'0')+'h';
const dayp=dp=>(!dp||!dp.length)?null:dp.map(w=>w.days.map(d=>DIAS[d]).join('+')+' '+h(w.start_minute)+'-'+h(w.end_minute)).join(' · ');
const flagIcon=l=>l==='ok'?'✅':l==='warn'?'⚠️':'ℹ️';
const kpi=(l,v,c='')=>`<div class="kpi"><div class="kpi-l">${l}</div><div class="kpi-v ${c}">${v}</div></div>`;

function kpiRow(i){
  if(!i)return '<div class="kpi-row muted">— sem dados de performance —</div>';
  return `<div class="kpi-row">
    ${kpi('Gasto',brl(i.spend),'amber')}${kpi('Compras',num(i.purchases))}${kpi('ROAS',xx(i.roas),i.roas>=2?'green':'')}
    ${kpi('CPA',i.cpa!=null?brl(i.cpa):'—')}${kpi('Retorno',brl(i.revenue),'green')}${kpi('CPM',brl(i.cpm))}
    ${kpi('CTR',pct(i.ctr))}${kpi('Alcance',num(i.reach))}${kpi('Freq',i.frequency?i.frequency.toFixed(1).replace('.',','):'—')}</div>`;
}
function targBlock(t){
  if(!t)return '';
  return `<div class="targ">
    <span class="targ-i">📍 ${esc(t.geo||'—')}${t.location_types?' ('+t.location_types.join('+')+')':''}</span>
    <span class="targ-i">👤 ${esc(t.age)} · ${esc(t.genders)}</span>
    <span class="targ-i">📱 ${esc((t.device||['todos']).join('+'))}</span>
    ${t.interests?`<span class="targ-i">🎯 ${esc(t.interests.slice(0,6).join(', '))}</span>`:''}
    ${(t.fb_positions||t.ig_positions)?`<span class="targ-i">📐 FB[${esc((t.fb_positions||[]).join(',')||'—')}] · IG[${esc((t.ig_positions||[]).join(',')||'—')}]</span>`:''}
  </div>`;
}
function adCard(a){
  const cr=a.creative||{},i=a.insights;
  return `<div class="adcard ${a.effective_status!=='ACTIVE'?'paused':''}">
    <div class="adcard-img">${cr.image?`<img src="${esc(cr.image)}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=noimg>sem prévia</div>'>`:'<div class="noimg">sem<br>prévia</div>'}</div>
    <div class="adcard-body">
      <div class="adcard-head"><b title="${esc(a.name)}">${esc(a.name)}</b><span class="st ${esc(a.effective_status)}">${esc(a.effective_status)}</span>${cr.customized?'<span class="cust">Feed+Story</span>':''}</div>
      ${cr.title?`<div class="ad-title">${esc(cr.title)}</div>`:''}
      ${cr.body?`<div class="ad-copy" onclick="this.classList.toggle('open')">${esc(cr.body)}</div>`:''}
      <div class="ad-meta">${cr.cta?`<span class="cta">${esc(cr.cta)}</span>`:''}${cr.link?`<a class="ad-link" href="${esc(cr.link)}" target="_blank">destino ↗</a>`:''}</div>
      ${i?`<div class="ad-kpis">💰 ${brl(i.spend)} · 🛒 ${num(i.purchases)} compras · ${xx(i.roas)} · CTR ${pct(i.ctr)}</div>`:''}
    </div></div>`;
}
function adsetBlock(s){
  const budget=s.lifetime_budget_cents?'lifetime R$ '+(s.lifetime_budget_cents/100).toFixed(2):(s.daily_budget_cents?'diário R$ '+(s.daily_budget_cents/100).toFixed(2):'—');
  const dp=dayp(s.dayparting);
  const extra=[dp?'⏰ '+dp+' ('+s.dayparting[0].tz+')':'',s.pixel?'📊 pixel '+s.pixel.id+(s.pixel.event?'·'+s.pixel.event:''):'',s.frequency?'🔁 '+s.frequency.max_frequency+'/'+s.frequency.interval_days+'d':'','💰 '+budget,s.destination_type?'➡️ '+s.destination_type:''].filter(Boolean).join(' · ');
  return `<div class="adset">
    <div class="adset-name">🎯 ${esc(s.name)} <span class="st ${esc(s.effective_status)}">${esc(s.effective_status)}</span> · <span class="muted">${esc(s.optimization_goal)}</span></div>
    <div class="flags">${(s.flags||[]).map(f=>`<span class="flag ${f.l}">${flagIcon(f.l)} ${esc(f.t)}</span>`).join('')}</div>
    ${targBlock(s.targeting)}
    <div class="adset-extra">${esc(extra)}</div>
    <div class="ads-grid">${(s.ads||[]).map(adCard).join('')||'<div class="empty">sem anúncios</div>'}</div>
  </div>`;
}
function campBlock(c){
  const warns=(c.adsets||[]).reduce((n,s)=>n+(s.flags||[]).filter(f=>f.l==='warn').length,0);
  const objClass=['OUTCOME_SALES','OUTCOME_AWARENESS','OUTCOME_TRAFFIC'].includes(c.objective)?c.objective:'other';
  const budget=c.budget_level==='CBO'?('CBO '+brl((c.lifetime_budget_cents||c.daily_budget_cents)/100)):'ABO';
  return `<div class="camp ${warns?'has-warn':''}" id="c-${c.id}">
    <div class="camp-head" onclick="document.getElementById('c-${c.id}').classList.toggle('open')">
      <span class="obj ${objClass}">${esc(c.objective_label)}</span>
      <span class="camp-name" title="${esc(c.name)}">${esc(c.name)}</span>
      <span class="budget-tag">${esc(budget)}</span>
      ${warns?`<span class="warn-count">⚠️ ${warns}</span>`:''}
      <span class="st ${esc(c.effective_status)}">${esc(c.effective_status)}</span><span class="chev">▶</span>
    </div>
    ${kpiRow(c.insights)}
    <div class="camp-body">
      ${(c.adsets||[]).map(adsetBlock).join('')}
      ${c.objective==='OUTCOME_SALES'?'<div class="multi-note">⚠️ Lembrete (skill §2.2): conferir "Anúncios com vários anunciantes" desmarcado no Gerenciador.</div>':''}
    </div></div>`;
}

async function loadClient(slug,force){
  CURRENT=slug;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.slug===slug));
  $('#root').innerHTML='<div class="loading">Carregando estrutura + performance…</div>';
  $('#pill-updated').textContent='⏳';$('#pill-updated').className='pill warn';
  try{
    const r=await fetch(location.origin+'/api/admin/estruturas?slug='+slug+(force?'&force=1':''));
    const d=await r.json();
    if(d.error){$('#root').innerHTML=`<div class="err-banner">⚠ ${esc(d.error)} (${esc(d.client_name||slug)})</div>`;$('#pill-updated').textContent='✗';return;}
    const tw=d.campaigns.reduce((n,c)=>n+(c.adsets||[]).reduce((m,s)=>m+(s.flags||[]).filter(f=>f.l==='warn').length,0),0);
    const t=d.totals||{};
    const head=`<div class="totals">
      <div class="tcard hero"><div class="tl">Gasto total</div><div class="tv amber">${brl(t.spend)}</div></div>
      <div class="tcard"><div class="tl">Retorno</div><div class="tv green">${brl(t.revenue)}</div></div>
      <div class="tcard"><div class="tl">ROAS</div><div class="tv ${t.roas>=2?'green':''}">${xx(t.roas)}</div></div>
      <div class="tcard"><div class="tl">Compras</div><div class="tv">${num(t.purchases)}</div></div>
      <div class="tcard"><div class="tl">CPA médio</div><div class="tv">${t.cpa!=null?brl(t.cpa):'—'}</div></div>
      <div class="tcard"><div class="tl">Alertas regra</div><div class="tv ${tw?'warn':''}">${tw?'⚠️ '+tw:'✅ 0'}</div></div>
    </div>
    <div class="periodo">${d.campaigns_count} campanha(s) ativa(s) · conta act_${esc(d.ad_account_id)} · período: ${esc(d.periodo||'vida útil')} · atualizado ${new Date(d.updated_at).toLocaleTimeString('pt-BR')}</div>`;
    $('#root').innerHTML=head+(d.campaigns.length?d.campaigns.map(campBlock).join(''):'<div class="empty">Nenhuma campanha ativa.</div>');
    document.querySelector('.camp')?.classList.add('open'); // abre a 1ª por padrão
    $('#pill-updated').textContent='✓ '+new Date(d.updated_at).toLocaleTimeString('pt-BR');$('#pill-updated').className='pill ok';
  }catch(e){$('#root').innerHTML=`<div class="err-banner">Erro: ${esc(e.message)}</div>`;$('#pill-updated').textContent='✗';}
}
async function init(){
  try{
    const r=await fetch(location.origin+'/api/admin/estruturas');
    const cs=(await r.json()).clients||[];
    $('#tabs').innerHTML=cs.map(c=>`<button class="tab" data-slug="${c.slug}" onclick="loadClient('${c.slug}')">${esc(c.name)}</button>`).join('');
    if(cs.length)loadClient(cs.find(c=>c.slug==='feio')?'feio':cs[0].slug);
    else $('#root').innerHTML='<div class="empty">Nenhum cliente com conta de anúncio.</div>';
  }catch(e){$('#root').innerHTML=`<div class="err-banner">Erro: ${esc(e.message)}</div>`;}
}
init();
</script>
</body>
</html>
