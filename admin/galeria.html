<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria de Posts · Clientes · Starken</title>
<style>
  :root {
    --bg-0: #0a0e1a; --bg-1: #131b2e; --bg-2: #1a2440; --bg-3: #243154;
    --text-0: #f8fafc; --text-1: #cbd5e1; --text-2: #94a3b8; --text-3: #64748b;
    --accent: #fbbf24; --ok: #4ade80; --warn: #fbbf24; --err: #f87171; --info: #60a5fa;
    --border: rgba(255, 255, 255, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg-0); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
    color: var(--text-0); min-height: 100vh; padding: 24px 32px 60px;
  }
  a { color: var(--info); text-decoration: none; }

  .topnav {
    display: flex; align-items: center; gap: 18px; padding: 14px 22px;
    background: rgba(19, 27, 46, 0.85); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 16px; margin-bottom: 22px;
    flex-wrap: wrap; position: sticky; top: 12px; z-index: 100;
  }
  .brand { font-weight: 800; font-size: 18px; background: linear-gradient(90deg, var(--accent), #f59e0b); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
  .brand-sub { color: var(--text-3); font-size: 12px; font-weight: 500; margin-left: -8px; }
  .nav-links { display: flex; gap: 6px; flex-wrap: wrap; margin-left: 6px; }
  .nav-links a { padding: 6px 12px; border-radius: 8px; color: var(--text-1); font-size: 13px; font-weight: 500; }
  .nav-links a:hover { background: rgba(255,255,255,0.05); color: var(--text-0); text-decoration: none; }
  .topnav-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pill { padding: 6px 12px; border-radius: 999px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .pill.ok { background: rgba(74, 222, 128, 0.12); border-color: rgba(74, 222, 128, 0.35); color: var(--ok); }
  .pill.warn { background: rgba(251, 191, 36, 0.12); border-color: rgba(251, 191, 36, 0.35); color: var(--warn); }
  .pill.err { background: rgba(248, 113, 113, 0.12); border-color: rgba(248, 113, 113, 0.35); color: var(--err); }
  .btn { padding: 8px 16px; border-radius: 10px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: white; cursor: pointer; font-weight: 600; font-size: 12px; }
  .btn:hover { opacity: 0.85; }

  .tabs { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; }
  .tab { padding: 8px 14px; border: 1px solid var(--border); background: var(--bg-1); color: var(--text-2); font-size: 13px; font-weight: 600; border-radius: 999px; cursor: pointer; }
  .tab.active { background: var(--accent); color: #1a0f08; border-color: var(--accent); }
  .tab .n { opacity: .7; margin-left: 5px; font-size: 11px; }

  .client-block { margin-bottom: 34px; }
  .client-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .client-name { font-weight: 800; font-size: 17px; }
  .client-handle { font-size: 12px; color: var(--text-3); }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
  .badge-starken { background: rgba(248, 113, 113, 0.15); color: var(--err); }
  .badge-other { background: rgba(148, 163, 184, 0.15); color: var(--text-2); }
  .client-count { margin-left: auto; font-size: 12px; color: var(--text-3); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .post { position: relative; aspect-ratio: 1/1; border-radius: 10px; overflow: hidden; background: var(--bg-2); display: block; border: 1px solid var(--border); }
  .post img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .2s; }
  .post:hover img { transform: scale(1.06); }
  .post-noimg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-3); font-size: 11px; text-align: center; padding: 8px; }
  .post-type { position: absolute; top: 6px; right: 6px; font-size: 13px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.7)); }
  .post-src { position: absolute; top: 6px; left: 6px; font-size: 11px; padding: 2px 6px; border-radius: 6px; font-weight: 700; }
  .post-src.ig { background: linear-gradient(45deg, #fdc832, #ee2a7b, #6228d7); color: #fff; }
  .post-src.fb { background: #1877f2; color: #fff; }
  .post-overlay {
    position: absolute; inset: 0; background: linear-gradient(180deg, transparent 45%, rgba(0,0,0,.82) 100%);
    opacity: 0; transition: opacity .15s; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 9px; gap: 3px;
  }
  .post:hover .post-overlay { opacity: 1; }
  .post-date { font-size: 11px; color: #fff; font-weight: 600; }
  .post-stats { font-size: 11px; color: var(--text-1); }
  .post-cap { font-size: 10px; color: var(--text-2); line-height: 1.3; max-height: 39px; overflow: hidden; }

  .loading { text-align: center; color: var(--text-2); padding: 70px 20px; font-size: 14px; }
  .err-banner { background: rgba(248,113,113,.10); border: 1px solid rgba(248,113,113,.3); color: var(--err); padding: 14px 18px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; }
  .client-err { font-size: 11px; color: var(--warn); margin-top: 8px; }
  .fb-note { font-size: 11px; color: var(--text-3); margin-top: 10px; display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; background: rgba(24,119,242,.08); border: 1px solid rgba(24,119,242,.2); border-radius: 8px; }
  .info-banner { background: rgba(96,165,250,.08); border: 1px solid rgba(96,165,250,.25); color: var(--text-1); padding: 11px 16px; border-radius: 10px; margin-bottom: 18px; font-size: 12.5px; }
  .empty { color: var(--text-3); font-size: 13px; padding: 20px; }

  /* POST DETAILS MODAL */
  .details-modal { position:fixed; inset:0; z-index:2000; background:rgba(5,8,16,.88); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; padding:32px; }
  .details-modal.open { display:flex; }
  .details-modal-inner { position:relative; width:100%; max-width:680px; background:var(--bg-1); border:1px solid var(--border); border-radius:18px; max-height:90vh; overflow-y:auto; display:flex; flex-direction:column; box-shadow:0 24px 70px rgba(0,0,0,.7); }
  .details-modal-inner::-webkit-scrollbar { width: 6px; }
  .details-modal-inner::-webkit-scrollbar-track { background: transparent; }
  .details-modal-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .details-modal-inner::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  .details-modal-close { position:absolute; top:16px; right:16px; width:38px; height:38px; border-radius:50%; background:var(--bg-2); border:1px solid var(--border); color:#fff; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; }
  .details-modal-close:hover { background:var(--err); border-color:var(--err); }
  .dm-header { padding:24px 30px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; padding-right:60px; }
  .dm-body { padding:24px 30px; display:flex; flex-direction:column; gap:20px; }
  .dm-media { width:100%; max-height:400px; border-radius:12px; background:var(--bg-0); display:flex; align-items:center; justify-content:center; overflow:hidden; border:1px solid var(--border); }
  .dm-media img, .dm-media video { max-width:100%; max-height:400px; object-fit:contain; }
  .dm-meta { display:flex; gap:10px; flex-wrap:wrap; font-size:12px; color:var(--text-2); }
  .dm-caption { background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:12px; padding:16px; font-size:14px; line-height:1.6; color:var(--text-1); white-space:pre-wrap; }
  .dm-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; border-top:1px dashed var(--border); padding-top:20px; }
</style>
<link rel="icon" href="/design-system/assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/design-system/tokens/starken-tokens.css">
<style>
  /* Identidade Starken (Design System) — /design-system/ */
  :root{
    --bg-0:#020617; --bg-1:#0f172a; --bg-2:#1e293b; --bg-3:#334155;
    --accent:#10b981; --accent-dim:rgba(16,185,129,.15); --border-hover:rgba(16,185,129,.35);
    --starken:#0d9488; --starken-dim:rgba(13,148,136,.12);
    --ok:#10b981; --warn:#f59e0b; --err:#ef4444; --info:#3b82f6;
  }
  body{ font-family:var(--font-body,'Inter',-apple-system,sans-serif); }
  h1,h2,h3{ font-family:var(--font-display,'Sora',sans-serif); }
</style>
</head>
<body>

<nav class="topnav">
  <div>
    <span class="brand">🖼️ Galeria de Posts</span>
    <span class="brand-sub"> · publicados por cliente</span>
  </div>
  <div class="nav-links">
    <a href="/admin/">🛡️ Admin</a>
    <a href="/admin/operacoes.html">🎛️ Operações</a>
    <a href="/admin/monitor.html">📡 Monitor</a>
    <a href="/agendamentos.html">📅 Agendamentos</a>
    <a href="/admin/hubs.html">💼 Hub do Cliente</a>
  </div>
  <div class="topnav-right">
    <span class="pill" id="pill-updated">⏳ Carregando…</span>
    <button class="btn" onclick="reload(true)">↻ Atualizar</button>
  </div>
</nav>

<div class="tabs" id="tabs"></div>
<div id="root"><div class="loading">Buscando posts publicados de todos os clientes…</div></div>

<script>
const $ = (s, r=document) => r.querySelector(s);
let DATA = null, filter = 'all';

const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
const fmtDate = (iso) => new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
const num = (n) => (n == null ? null : new Intl.NumberFormat('pt-BR').format(n));
function typeIcon(t) { return t === 'VIDEO' ? '🎬' : t === 'CAROUSEL_ALBUM' ? '🖼️' : ''; }
function agencyBadge(a) { return a === 'Starken' ? '<span class="badge badge-starken">⚡ Starken</span>' : `<span class="badge badge-other">${esc(a||'—')}</span>`; }

function postCard(p, client, idx) {
  const stats = (p.likes != null || p.comments != null)
    ? `<div class="post-stats">${p.likes != null ? '❤️ ' + num(p.likes) : ''}${p.comments != null ? ' · 💬 ' + num(p.comments) : ''}</div>` : '';
  const media = p.thumb
    ? `<img src="${esc(p.thumb)}" alt="post" loading="lazy" onerror="this.parentNode.classList.add('broken');this.remove();">`
    : `<div class="post-noimg">sem prévia</div>`;
  return `<a class="post" onclick="openPostDetails('${client.slug}', ${idx})" title="${esc(p.caption || '')}" style="cursor:pointer;">
    ${media}
    <span class="post-src ${p.source === 'instagram' ? 'ig' : 'fb'}">${p.source === 'instagram' ? 'IG' : 'FB'}</span>
    ${typeIcon(p.type) ? `<span class="post-type">${typeIcon(p.type)}</span>` : ''}
    <div class="post-overlay">
      <div class="post-cap">${esc((p.caption || '').slice(0, 90))}</div>
      <div class="post-date">${fmtDate(p.timestamp)}</div>
      ${stats}
    </div>
  </a>`;
}

function clientBlock(c) {
  if (!c.posts.length && !c.error) return '';
  return `<div class="client-block" data-slug="${c.slug}">
    <div class="client-head">
      <div>
        <div class="client-name">${esc(c.name)}</div>
        <div class="client-handle">${c.ig_username ? '@' + esc(c.ig_username) : ''}</div>
      </div>
      ${agencyBadge(c.agencia)}
      <span class="client-count">${c.total} post${c.total !== 1 ? 's' : ''}</span>
    </div>
    ${c.posts.length ? `<div class="grid">${c.posts.map((p, i) => postCard(p, c, i)).join('')}</div>` : '<div class="empty">Nenhum post retornado.</div>'}
    ${c.error ? `<div class="client-err">⚠ ${esc(c.error)}</div>` : ''}
    ${c.fb_note ? `<div class="fb-note">📘 ${esc(c.fb_note)}</div>` : ''}
  </div>`;
}

function renderTabs() {
  const cs = (DATA.clients || []).filter(c => c.posts.length || c.error);
  let html = `<button class="tab ${filter==='all'?'active':''}" data-f="all">Todos<span class="n">${cs.reduce((s,c)=>s+c.total,0)}</span></button>`;
  html += cs.map(c => `<button class="tab ${filter===c.slug?'active':''}" data-f="${c.slug}">${esc(c.name)}<span class="n">${c.total}</span></button>`).join('');
  $('#tabs').innerHTML = html;
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => { filter = t.dataset.f; render(); });
}

function render() {
  if (!DATA) return;
  if (DATA.error) { $('#root').innerHTML = `<div class="err-banner">⚠ ${esc(DATA.error)}</div>`; return; }
  renderTabs();
  const cs = (DATA.clients || []).filter(c => (filter === 'all' || c.slug === filter) && (c.posts.length || c.error || c.fb_note));
  const anyFbLimit = (DATA.clients || []).some(c => /limite de chamadas/i.test(c.fb_note || ''));
  let banner = '';
  if (anyFbLimit) {
    const u = DATA.app_usage || {};
    const cc = u.call_count != null ? u.call_count : null;
    const tt = u.total_time != null ? u.total_time : null;
    const over = cc != null && cc >= 100;
    const usageTxt = cc != null
      ? `Uso do app: <b style="color:${over ? 'var(--err)' : 'var(--ok)'}">chamadas ${cc}%</b>${tt != null ? ` · tempo ${tt}%` : ''} — o FB libera quando cair <b>abaixo de 100%</b>.`
      : '';
    const fetched = DATA.updated_at ? new Date(DATA.updated_at).toLocaleTimeString('pt-BR') : '';
    banner = `<div class="info-banner">📘 <b>Facebook no limite de chamadas da Meta.</b> ${usageTxt}<br>
      <span style="color:var(--text-3)">A Meta não informa horário exato de reset (janela móvel de ~1h) — acompanhe a % acima. Instagram segue normal · dados de ${fetched} · clique <b>↻ Atualizar</b> pra tentar de novo.</span></div>`;
  }
  $('#root').innerHTML = banner + (cs.length ? cs.map(clientBlock).join('') : '<div class="empty">Sem posts.</div>');
}

async function reload(force = false) {
  const pu = $('#pill-updated'); pu.textContent = '⏳ Atualizando…'; pu.className = 'pill warn';
  try {
    const r = await fetch(location.origin + '/api/admin/posts' + (force ? '?force=1' : ''));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    render();
    pu.textContent = '✓ ' + new Date(DATA.updated_at).toLocaleTimeString('pt-BR'); pu.className = 'pill ok';
  } catch (e) { pu.textContent = '✗ ' + e.message; pu.className = 'pill err'; }
}

reload();

function openPostDetails(slug, idx) {
  const client = DATA.clients.find(c => c.slug === slug);
  if (!client) return;
  const post = client.posts[idx];
  if (!post) return;

  const m = document.getElementById('details-modal');
  
  let mediaHtml = '';
  if (post.thumb) {
    mediaHtml = `<div class="dm-media"><img src="${esc(post.thumb)}" alt="Post Media"></div>`;
  }
  
  const msg = post.caption || 'Sem texto.';
  const timeStr = 'Publicado: ' + new Date(post.timestamp).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
  const likesStr = post.likes != null ? `❤️ ${num(post.likes)}` : '';
  const commentsStr = post.comments != null ? `💬 ${num(post.comments)}` : '';
  
  const linksHtml = [];
  if (post.permalink) linksHtml.push(`<a class="btn" href="${esc(post.permalink)}" target="_blank" style="text-decoration:none;padding:8px 16px;">Ver post original ↗</a>`);

  m.querySelector('.details-modal-inner').innerHTML = `
    <button class="details-modal-close" onclick="closeDetailsModal()">✕</button>
    <div class="dm-header">
      <div style="flex:1;">
        <div style="font-size:18px;font-weight:800;color:var(--text-0);">${esc(client.name)}</div>
        <div class="dm-meta" style="margin-top:4px;">
          ${agencyBadge(client.agencia)}
          <span class="pill info">${post.source === 'instagram' ? '📸 Instagram' : '📘 Facebook'}</span>
        </div>
      </div>
    </div>
    <div class="dm-body">
      ${mediaHtml}
      <div class="dm-meta">
        <span class="pill">${esc(timeStr)}</span>
        ${likesStr ? `<span class="pill">${likesStr}</span>` : ''}
        ${commentsStr ? `<span class="pill">${commentsStr}</span>` : ''}
      </div>
      <div class="dm-caption">${esc(msg)}</div>
      ${linksHtml.length > 0 ? `<div class="dm-actions">${linksHtml.join('')}</div>` : ''}
    </div>
  `;
  
  m.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetailsModal() {
  const m = document.getElementById('details-modal');
  m.classList.remove('open');
  m.querySelector('.details-modal-inner').innerHTML = '';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', (e) => { 
  if (e.key === 'Escape') closeDetailsModal(); 
});
</script>

<div id="details-modal" class="details-modal" onclick="if(event.target===this) closeDetailsModal()">
  <div class="details-modal-inner">
  </div>
</div>

</body>
</html>
