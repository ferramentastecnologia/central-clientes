<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard do Cliente · Starken</title>
<link rel="stylesheet" href="/design-system/tokens/starken-tokens.css">
<style>
  :root {
    --bg-0: #0a0e1a;
    --bg-1: #111827;
    --bg-2: #161f33;
    --text-0: #f8fafc;
    --text-1: #cbd5e1;
    --text-2: #94a3b8;
    --text-3: #64748b;
    --brand: #3b82f6;
    --brand-dim: rgba(59, 130, 246, 0.12);
    --border: rgba(255, 255, 255, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(1100px 560px at 85% -12%, rgba(59, 130, 246, 0.05), transparent), var(--bg-0);
    color: var(--text-0);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 24px 32px 60px;
  }
  a { text-decoration: none; color: inherit; }

  /* TOPNAV */
  .topnav {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 14px 22px;
    background: rgba(19, 27, 46, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    position: sticky;
    top: 12px;
    z-index: 100;
  }
  .brand-logo {
    font-weight: 800;
    font-size: 18px;
    background: linear-gradient(90deg, var(--brand), #60a5fa);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .brand-sub { color: var(--text-3); font-size: 12px; font-weight: 500; margin-left: -8px; }
  .nav-links { display: flex; gap: 6px; flex-wrap: wrap; margin-left: 6px; }
  .nav-links a {
    padding: 6px 12px;
    border-radius: 8px;
    color: var(--text-1);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .nav-links a:hover { background: rgba(255,255,255,0.05); color: var(--text-0); }

  /* HEADER DE MARCA */
  .brandhead {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    border-radius: 16px;
    margin-bottom: 32px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .brandhead::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: var(--brand);
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text-1);
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
  }
  .back-btn:hover {
    color: var(--brand);
    border-color: var(--brand);
    transform: translateX(-2px);
  }
  .brand-ini {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 900;
    color: #0a0e1a;
    background: var(--brand);
    flex-shrink: 0;
    overflow: hidden;
  }
  .brand-ini img { width: 100%; height: 100%; object-fit: cover; }
  .brand-title {
    flex: 1;
  }
  .brand-name { font-size: 20px; font-weight: 800; color: var(--text-0); }
  .brand-seg { font-size: 13px; color: var(--text-2); margin-top: 2px; }

  /* GRID */
  .hub-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }
  @media (min-width: 768px) {
    .hub-grid {
      grid-template-columns: 1.2fr 1fr;
    }
  }

  .panel {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .panel-title {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-3);
    font-weight: 800;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  /* LIST ITEMS */
  .list-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    border-radius: 12px;
    background: rgba(0,0,0,0.15);
    border: 1px solid var(--border);
    transition: all 0.18s;
  }
  .list-item.link:hover {
    border-color: var(--brand);
    background: rgba(255, 255, 255, 0.02);
    transform: translateY(-1px);
  }
  .item-icon {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: var(--brand-dim);
    color: var(--brand);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .item-content { flex: 1; min-width: 0; }
  .item-title { font-size: 14.5px; font-weight: 700; color: var(--text-0); margin-bottom: 2px; }
  .item-meta { font-size: 12px; color: var(--text-3); }
  .item-arrow { color: var(--text-3); font-size: 14px; transition: transform 0.15s; }
  .list-item.link:hover .item-arrow { transform: translateX(3px); color: var(--brand); }

  .empty {
    color: var(--text-3);
    padding: 24px;
    text-align: center;
    font-size: 13px;
  }
  .loading { text-align: center; padding: 60px; color: var(--text-2); }
</style>
</head>
<body>

<nav class="topnav">
  <div>
    <span class="brand-logo">💼 Hub do Cliente</span>
    <span class="brand-sub"> · painel</span>
  </div>
  <div class="nav-links">
    <a href="/admin/">🛡️ Admin</a>
    <a href="/admin/operacoes.html">🎛️ Operações</a>
    <a href="/admin/monitor.html">📡 Monitor</a>
    <a href="/admin/galeria.html">🖼️ Galeria</a>
    <a href="/agendamentos.html">📅 Agendamentos</a>
    <a href="/admin/hubs.html">💼 Hub do Cliente</a>
  </div>
</nav>

<div id="root">
  <div class="loading">Buscando dados do cliente…</div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

// Lista estática de relatórios por cliente
const RELATORIOS = {
  feio: [{ name: 'Relatório Mensal - Maio/2026', url: '/feio/relatorio-maio.html', date: 'Maio 2026' }],
  centro: [{ name: 'Relatório Mensal - Maio/2026', url: '/centro/relatorio-maio.html', date: 'Maio 2026' }],
  garcia: [{ name: 'Relatório Mensal - Maio/2026', url: '/garcia/relatorio-maio.html', date: 'Maio 2026' }],
};

// Lista estática de otimizações e análises por cliente
const OTIMIZACOES = {
  centro: [{ name: 'Análise de Performance (Campanhas de Vendas)', url: '/centro/analise-junho.html', desc: 'Breakdown completo por hora e dia de junho/2026' }],
};

function renderDashboard(c) {
  const initial = (c.name || '?').trim()[0].toUpperCase();
  const avatar = c.instagram?.avatar 
    ? `<img src="${c.instagram.avatar}" alt="">` 
    : initial;
  const cor = c.cor || '#3b82f6';
  const slug = c.slug;

  // Customizamos as variáveis de marca
  document.documentElement.style.setProperty('--brand', cor);
  document.documentElement.style.setProperty('--brand-dim', `rgba(${hexToRgb(cor)}, 0.12)`);
  document.body.style.backgroundImage = `radial-gradient(1100px 560px at 85% -12%, rgba(${hexToRgb(cor)}, 0.05), transparent)`;

  const rels = RELATORIOS[slug] || [];
  const otims = OTIMIZACOES[slug] || [];

  const relsHtml = rels.length 
    ? rels.map(r => `
        <a href="${r.url}" class="list-item link">
          <div class="item-icon">📋</div>
          <div class="item-content">
            <div class="item-title">${esc(r.name)}</div>
            <div class="item-meta">Publicado em ${esc(r.date)}</div>
          </div>
          <div class="item-arrow">→</div>
        </a>
      `).join('')
    : '<div class="empty">Nenhum relatório disponível para este cliente.</div>';

  const otimsHtml = otims.length 
    ? otims.map(o => `
        <a href="${o.url}" class="list-item link">
          <div class="item-icon">📈</div>
          <div class="item-content">
            <div class="item-title">${esc(o.name)}</div>
            <div class="item-meta">${esc(o.desc)}</div>
          </div>
          <div class="item-arrow">→</div>
        </a>
      `).join('')
    : '<div class="empty">Nenhuma otimização registrada ainda.</div>';

  $('#root').innerHTML = `
    <div class="brandhead">
      <a href="/admin/hubs.html" class="back-btn" title="Voltar ao Seletor">←</a>
      <div class="brand-ini">${avatar}</div>
      <div class="brand-title">
        <div class="brand-name">${esc(c.name)}</div>
        <div class="brand-seg">${esc(c.seg || 'Tráfego Pago · Performance')}</div>
      </div>
    </div>

    <div class="hub-grid">
      <!-- COLUNA PRINCIPAL: PRODUTOS DO HUB -->
      <div style="display:flex; flex-direction:column; gap:24px;">
        <!-- CARD COCKPIT -->
        <div class="panel">
          <div class="panel-title">Monitor & Gestão</div>
          <a href="/admin/operacoes.html?slug=${slug}" class="list-item link">
            <div class="item-icon">🎛️</div>
            <div class="item-content">
              <div class="item-title">Cockpit de Performance (Ao Vivo)</div>
              <div class="item-meta">Estrutura de campanhas, conjuntos, anúncios e criativos ativos</div>
            </div>
            <div class="item-arrow">→</div>
          </a>
        </div>

        <!-- CARD OTIMIZAÇÕES -->
        <div class="panel">
          <div class="panel-title">Otimizações e Análises</div>
          ${otimsHtml}
        </div>
      </div>

      <!-- COLUNA SECUNDÁRIA: HISTÓRICO E RELATÓRIOS -->
      <div class="panel">
        <div class="panel-title">Relatórios Mensais</div>
        ${relsHtml}
      </div>
    </div>
  `;
}

// Helpers
function hexToRgb(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(x => x + x).join('');
  const r = parseInt(hex.substring(0, 2), 16);
  const g = parseInt(hex.substring(2, 4), 16);
  const b = parseInt(hex.substring(4, 6), 16);
  return `${r}, ${g}, ${b}`;
}

async function load() {
  const q = new URLSearchParams(location.search);
  const slug = q.get('c') || q.get('slug');
  
  if (!slug) {
    $('#root').innerHTML = '<div class="loading" style="color:var(--err)">Parâmetro do cliente não fornecido na URL (?c=slug)</div>';
    return;
  }

  try {
    const r = await fetch('/api/clients');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const clients = data.clients || [];
    const client = clients.find(c => c.slug === slug);
    
    if (!client) {
      $('#root').innerHTML = `<div class="loading" style="color:var(--err)">Cliente "${esc(slug)}" não encontrado.</div>`;
      return;
    }

    renderDashboard(client);
  } catch (e) {
    $('#root').innerHTML = `<div class="loading" style="color:var(--err)">Erro ao buscar dados do cliente: ${esc(e.message)}</div>`;
  }
}
load();
</script>
</body>
</html>
