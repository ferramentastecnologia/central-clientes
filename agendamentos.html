<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamentos · Starken Tecnologia</title>
<link rel="icon" href="/design-system/assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/design-system/tokens/starken-tokens.css">
<style>
  :root {
    /* Identidade Starken (Design System) — slate + esmeralda */
    --bg-0: #020617;   /* slate-950 */
    --bg-1: #0f172a;   /* slate-900 */
    --bg-2: #1e293b;   /* slate-800 */
    --bg-3: #334155;   /* slate-700 */
    --text-0: #f8fafc;
    --text-1: #cbd5e1;
    --text-2: #94a3b8;
    --text-3: #64748b;
    --accent: #10b981;                          /* esmeralda — primária */
    --accent-dim: rgba(16, 185, 129, 0.15);
    --ok: #10b981;
    --warn: #f59e0b;
    --err: #ef4444;
    --info: #3b82f6;
    --border: rgba(255, 255, 255, 0.08);
    --border-hover: rgba(16, 185, 129, 0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg-0); }
  body {
    font-family: var(--font-body, 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
    background: linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
    color: var(--text-0);
    min-height: 100vh;
    padding: 32px 40px 60px;
  }
  /* HEADER */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  h1 {
    font-family: var(--font-display, 'Sora', sans-serif);
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #10b981, #0d9488);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: var(--text-2);
    font-size: 14px;
    margin-top: 4px;
  }
  .status-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .pill {
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .pill.ok { background: rgba(74, 222, 128, 0.12); border-color: rgba(74, 222, 128, 0.35); color: var(--ok); }
  .pill.warn { background: rgba(251, 191, 36, 0.12); border-color: rgba(251, 191, 36, 0.35); color: var(--warn); }
  .pill.err { background: rgba(248, 113, 113, 0.12); border-color: rgba(248, 113, 113, 0.35); color: var(--err); }
  .btn {
    padding: 9px 18px;
    border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-ghost { background: rgba(255,255,255,0.06); border: 1px solid var(--border); }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
    padding: 12px;
    background: var(--bg-1);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .filters + .filters { margin-top: -4px; }
  .filter-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-right: 2px;
  }
  #client-filters { display: contents; }
  .filter-btn {
    padding: 7px 14px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-1);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .filter-btn:hover { border-color: var(--accent); }
  .toggle {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-1);
    cursor: pointer;
    user-select: none;
  }
  .toggle input { width: 16px; height: 16px; cursor: pointer; }

  /* SECTION */
  .section { margin-bottom: 40px; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-1);
    text-transform: uppercase;
    letter-spacing: 1.4px;
  }
  .section-count {
    font-size: 13px;
    color: var(--text-3);
  }

  /* HERO — Próximo post */
  .hero {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 28px;
    background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px;
    margin-bottom: 36px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(251,191,36,0.1) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-image {
    position: relative;
    z-index: 1;
  }
  .hero-image img {
    width: 100%;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    aspect-ratio: 4/5;
    object-fit: cover;
  }
  .hero-info { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 16px; }
  .hero-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    font-weight: 700;
  }
  .hero-title { font-size: 24px; font-weight: 800; line-height: 1.2; }
  .hero-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 13px; color: var(--text-2); }
  .hero-countdown {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 16px;
    padding: 18px 24px;
    text-align: center;
    margin: 8px 0;
  }
  .hero-countdown-label {
    font-size: 11px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .hero-countdown-time {
    font-family: 'SF Mono', Monaco, 'Cascadia Mono', monospace;
    font-size: 38px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .hero-countdown.imminent .hero-countdown-time { color: var(--err); animation: pulse 1s ease-in-out infinite; }
  .hero-caption {
    background: rgba(0,0,0,0.35);
    border-radius: 12px;
    padding: 18px 20px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-1);
    white-space: pre-wrap;
    max-height: 480px;
    overflow-y: auto;
    border: 1px solid var(--border);
    flex: 1;
  }
  .hero-caption::-webkit-scrollbar { width: 6px; }
  .hero-caption::-webkit-scrollbar-track { background: transparent; }
  .hero-caption::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .hero-caption::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  /* CARDS GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }
  .card.published { opacity: 0.5; }
  .card-top {
    padding: 18px 20px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .card-client {
    font-size: 16px;
    font-weight: 700;
  }
  .card-handle {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 2px;
    font-family: monospace;
  }
  .badge {
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .badge-starken { background: rgba(248, 113, 113, 0.15); color: var(--err); }
  .badge-fenice { background: rgba(192, 132, 252, 0.15); color: #c084fc; }
  .badge-other { background: rgba(148, 163, 184, 0.15); color: var(--text-2); }
  .card-image {
    width: 100%;
    aspect-ratio: 4/5;
    background: var(--bg-0);
    object-fit: cover;
    display: block;
  }
  .card-body { padding: 18px 20px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .countdown-box {
    background: var(--accent-dim);
    border: 1px solid rgba(251, 191, 36, 0.3);
    border-radius: 12px;
    padding: 12px 16px;
    text-align: center;
  }
  .countdown-box.imminent {
    background: rgba(248, 113, 113, 0.12);
    border-color: rgba(248, 113, 113, 0.4);
    animation: pulse 1s ease-in-out infinite;
  }
  .countdown-box.published {
    background: rgba(74, 222, 128, 0.12);
    border-color: rgba(74, 222, 128, 0.3);
  }
  .countdown-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-2);
    margin-bottom: 4px;
  }
  .countdown-time {
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
  }
  .countdown-box.imminent .countdown-time { color: var(--err); }
  .countdown-box.published .countdown-time { color: var(--ok); }
  .meta-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 14px;
    font-size: 13px;
  }
  .meta-grid dt { color: var(--text-3); font-weight: 500; }
  .meta-grid dd { color: var(--text-1); }
  .caption {
    background: var(--bg-0);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-1);
    white-space: pre-wrap;
    max-height: 320px;
    overflow-y: auto;
  }
  .caption.collapsed {
    max-height: 100px;
    position: relative;
  }
  .caption.collapsed::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(transparent, var(--bg-0));
    pointer-events: none;
  }
  .caption-toggle {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 11px;
    cursor: pointer;
    align-self: flex-start;
  }
  .caption-toggle:hover { color: var(--accent); border-color: var(--accent); }
  .card-actions { display: flex; gap: 8px; }

  /* POSTS PUBLICADOS — card compacto */
  .grid-pub { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card-pub .card-top { padding: 12px 14px 10px; }
  .card-pub .card-client { font-size: 14px; }
  .card-pub .card-image { aspect-ratio: 1 / 1; }
  .card-pub .card-body { padding: 12px 14px; gap: 8px; }
  .card-pub .caption { font-size: 12px; padding: 10px; }
  .card-pub .caption.collapsed { max-height: 60px; }
  .pub-date { font-size: 12px; font-weight: 600; color: var(--ok); }
  .pub-title { font-weight: 700; font-size: 13px; }
  .pub-links { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-xs { font-size: 11px; padding: 5px 10px; }
  .channel-tag {
    display: inline-block;
    padding: 4px 9px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    color: white;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .fb-tag { background: #1877f2; }
  .ig-tag { background: linear-gradient(45deg, #fdc832, #ee2a7b, #6228d7); }
  .monitor-tag { background: #6366f1; }
  .postmortem-tag { background: #a855f7; }

  /* EMPTY STATE */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-3);
    font-size: 13px;
    background: var(--bg-1);
    border: 1px dashed var(--border);
    border-radius: 16px;
  }

  /* CRON LIST */
  .cron-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 14px;
  }
  .cron-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cron-card.completed { border-left-color: var(--ok); opacity: 0.6; }
  .cron-card.imminent { border-left-color: var(--err); }
  .cron-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .cron-client { font-size: 14px; font-weight: 700; }
  .cron-desc { font-size: 12px; color: var(--text-2); line-height: 1.4; }
  .cron-countdown {
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
  }
  .cron-countdown.imminent { color: var(--err); animation: pulse 1s ease-in-out infinite; }
  .cron-countdown.completed { color: var(--ok); background: rgba(74, 222, 128, 0.1); }
  .cron-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-3);
    font-family: monospace;
  }
  /* cron card com preview de imagem */
  .cron-inner { display: flex; gap: 14px; align-items: stretch; }
  .cron-thumb {
    width: 104px; flex-shrink: 0; aspect-ratio: 9/16;
    border-radius: 10px; overflow: hidden; background: var(--bg-0);
    border: 1px solid var(--border); display: block; position: relative;
    transition: transform .15s, border-color .15s;
  }
  .cron-thumb:hover { transform: scale(1.03); border-color: var(--accent); }
  .cron-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cron-thumb::after {
    content: '🔍'; position: absolute; bottom: 5px; right: 5px;
    font-size: 11px; background: rgba(0,0,0,.55); border-radius: 6px;
    padding: 2px 5px; opacity: 0; transition: opacity .15s;
  }
  .cron-thumb:hover::after { opacity: 1; }
  .cron-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 9px; }
  .cron-when { font-size: 11px; color: var(--text-2); display: flex; align-items: center; gap: 5px; }
  .cron-foot { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: auto; }
  .cron-id { font-size: 10px; color: var(--text-3); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cron-status { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 999px; white-space: nowrap; letter-spacing: .02em; }
  .cron-status.pending { background: var(--accent-dim); color: var(--accent); }
  .cron-status.soon { background: rgba(248,113,113,.15); color: var(--err); }
  .cron-status.done { background: rgba(74,222,128,.12); color: var(--ok); }

  /* VIEW TABS (Agendados / Publicados) + FORMATO */
  .view-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .view-tab { padding:11px 22px; border-radius:12px; background:var(--bg-1); border:1px solid var(--border); color:var(--text-2); font-weight:700; font-size:14px; cursor:pointer; display:inline-flex; gap:8px; align-items:center; transition:all .15s; }
  .view-tab:hover { border-color:var(--accent); }
  .view-tab.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
  .view-tab .vt-count { font-size:11px; font-weight:700; background:rgba(255,255,255,.08); padding:2px 8px; border-radius:999px; }
  .fmt-summary { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .fmt-chip { display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:12px; background:var(--bg-1); border:1px solid var(--border); font-size:13px; font-weight:600; color:var(--text-1); }
  .fmt-chip b { font-size:15px; }
  .fmt-badge { padding:3px 9px; border-radius:7px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
  .fmt-story { background:rgba(96,165,250,.15); color:#60a5fa; }
  .fmt-feed { background:rgba(16,185,129,.16); color:#10b981; }
  .fmt-reel { background:rgba(168,85,247,.18); color:#c084fc; }
  .fmt-carousel { background:rgba(245,158,11,.18); color:#f59e0b; }
  .cron-thumb.placeholder { display:flex; align-items:center; justify-content:center; font-size:30px; color:var(--text-3); }
  .cron-thumb.cron-video { object-fit:cover; background:#000; cursor:default; }
  .cron-thumb.cron-video:hover { transform:none; border-color:var(--border); }
  .cron-thumb.cron-video::after { content:none; }
  .cron-badges { display:flex; flex-direction:column; gap:6px; align-items:flex-end; }

  /* STORIES PUBLICADOS */
  .stories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
  }
  .story-card { background: var(--bg-1); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
  .story-card.live { border-color: rgba(74,222,128,.4); box-shadow: 0 0 0 1px rgba(74,222,128,.08); }
  .story-media { position: relative; aspect-ratio: 9/16; background: var(--bg-0); display: block; }
  .story-media.media-45 { aspect-ratio: 4/5; }
  .story-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .story-media::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,.35) 0%, transparent 22%, transparent 70%, rgba(0,0,0,.55) 100%);
    pointer-events: none;
  }
  .story-badge {
    position: absolute; top: 9px; left: 9px; z-index: 2;
    font-size: 10px; font-weight: 800; padding: 4px 9px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 5px; letter-spacing: .02em;
  }
  .story-badge.live { background: var(--ok); color: #06210f; }
  .story-badge.live .pulse { width: 6px; height: 6px; border-radius: 999px; background: #06210f; animation: pulse 1.2s ease-in-out infinite; }
  .story-badge.expired { background: rgba(15,23,42,.78); color: var(--text-2); border: 1px solid var(--border); }
  .story-badge.perma { background: rgba(16,185,129,.18); color: var(--ok); border: 1px solid rgba(16,185,129,.4); }
  .story-ch { position: absolute; top: 9px; right: 9px; z-index: 2; font-size: 13px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.6)); }
  .story-info { padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .story-client { font-weight: 700; font-size: 13px; }
  .story-title { font-size: 11px; color: var(--text-2); line-height: 1.35; }
  .story-meta { font-size: 10.5px; color: var(--text-3); display: flex; align-items: center; gap: 4px; }
  .story-meta.live-text { color: var(--ok); font-weight: 600; }

  /* FOOTER */
  .footer {
    text-align: center;
    margin-top: 50px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--text-3);
    font-size: 12px;
  }
  .footer a { color: var(--text-2); text-decoration: none; }
  .footer a:hover { color: var(--accent); }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  @media (max-width: 900px) {
    body { padding: 20px 16px; }
    .hero { grid-template-columns: 1fr; }
    .hero-image { max-width: 320px; margin: 0 auto; }
  }

  .loading {
    text-align: center;
    color: var(--text-2);
    padding: 80px 0;
    font-size: 14px;
  }
</style>
</head>
<body>

<header class="top">
  <div>
    <a href="/"><img src="/design-system/assets/logo-starken-white.png" alt="Starken Tecnologia" style="height:24px;width:auto;display:block;margin-bottom:10px;opacity:.95"></a>
    <h1>📅 Agendamentos · Tempo Real</h1>
    <div class="subtitle">Posts Facebook (Graph API) + Cron Claude (Instagram & Monitoramento)</div>
  </div>
  <div class="status-row">
    <span class="pill" id="token-status">⏳ Verificando...</span>
    <span class="pill" id="updated-at">—</span>
    <a class="btn btn-ghost" href="/dashboard/">🎯 Central</a>
    <a class="btn btn-ghost" href="/renovacao.html">🔄 Renovação</a>
    <a class="btn btn-ghost" href="/admin/" title="Tokens & Acessos (admin)">🛡️ Admin</a>
    <button class="btn" onclick="loadData(true)">↻ Atualizar</button>
  </div>
</header>

<!-- VIEW TABS -->
<div class="view-tabs">
  <button class="view-tab active" data-view="agendados">📅 Agendados <span class="vt-count" id="vc-ag">0</span></button>
  <button class="view-tab" data-view="publicados">✅ Publicados <span class="vt-count" id="vc-pub">0</span></button>
</div>

<!-- FILTERS -->
<div class="filters">
  <span class="filter-label">Cliente:</span>
  <span id="client-filters"><button class="filter-btn active" data-client="all">Todos</button></span>
</div>
<div class="filters">
  <span class="filter-label">Canal:</span>
  <button class="filter-btn active" data-channel="all">Todos</button>
  <button class="filter-btn" data-channel="ig">📸 Instagram</button>
  <button class="filter-btn" data-channel="fb">📘 Facebook</button>
  <label class="toggle" style="margin-left:auto;">
    <input type="checkbox" id="show-old"> Mostrar concluídos
  </label>
</div>
<div class="filters" id="format-filters">
  <span class="filter-label">Formato:</span>
  <button class="filter-btn active" data-format="all">Todos</button>
  <button class="filter-btn" data-format="story">📖 Story</button>
  <button class="filter-btn" data-format="feed">🖼️ Feed</button>
  <button class="filter-btn" data-format="reel">🎬 Reel</button>
  <button class="filter-btn" data-format="carousel">🎠 Carrossel</button>
</div>

<div id="content">
  <div class="loading">Carregando...</div>
</div>

<div class="footer">
  Auto-refresh a cada 30s · Última verificação: <span id="last-check">—</span><br>
  <a href="/">← Dashboard principal</a>
</div>

<script>
const REFRESH_MS = 30000;
let currentClient = 'all';
let currentChannel = 'all';
let showOld = false;
let cachedData = null;
let clientFiltersBuilt = false;
let currentView = 'agendados';
let currentFormat = 'all';

// Formatos de material (selo por tipo)
const FORMAT = {
  story:    { label: 'Story',     icon: '📖', cls: 'fmt-story' },
  feed:     { label: 'Feed',      icon: '🖼️', cls: 'fmt-feed' },
  reel:     { label: 'Reel',      icon: '🎬', cls: 'fmt-reel' },
  carousel: { label: 'Carrossel', icon: '🎠', cls: 'fmt-carousel' },
};
const cronFormat = c => (c.kind && FORMAT[c.kind]) ? c.kind : 'story';
const formatBadge = kind => { const f = FORMAT[kind] || FORMAT.story; return `<span class="fmt-badge ${f.cls}">${f.icon} ${f.label}</span>`; };
const inFormat = c => currentFormat === 'all' || cronFormat(c) === currentFormat;
const fmtChip = (kind, n) => { const f = FORMAT[kind]; return `<span class="fmt-chip"><b>${f.icon}</b> ${n} ${f.label}${n !== 1 ? 's' : ''}</span>`; };

// Canais de cada item (fallback p/ entradas antigas sem o campo).
const cronChannels  = c => c.channels || (c.type === 'ig_publish' ? ['ig'] : c.type === 'campaign_monitor' ? ['monitor'] : []);
const storyChannels = s => s.channels || ['ig'];
const postChannels  = p => {
  if (Array.isArray(p.channels)) return p.channels;
  if (p.channels && typeof p.channels === 'object') {
    const a = [];
    if (p.channels.instagram) a.push('ig');
    if (p.channels.facebook) a.push('fb');
    return a.length ? a : ['fb'];
  }
  return ['fb'];
};
const inClient  = slug => currentClient === 'all' || slug === currentClient;
const inChannel = chans => currentChannel === 'all' || (chans || []).includes(currentChannel);
// Um cron "concluído" = marcado completed OU (one-shot) já passou da hora de disparar.
// Quando publicado, os criativos aparecem em "Stories Publicados" — então sai dos agendados.
const cronDone = c => c.status === 'completed' || (!c.recurring && c.next_fire_iso && new Date(c.next_fire_iso).getTime() <= Date.now());

// Badges de canal (📸/📘) a partir do array de canais.
function channelBadges(chans) {
  return (chans || []).map(ch =>
    ch === 'ig' ? '<span class="channel-tag ig-tag">📸 Instagram</span>'
    : ch === 'fb' ? '<span class="channel-tag fb-tag">📘 Facebook</span>'
    : ch === 'monitor' ? '<span class="channel-tag monitor-tag">📊 Monitor</span>'
    : ''
  ).join(' ');
}

function fmtCountdown(seconds) {
  if (seconds <= 0) return 'PUBLICADO ✓';
  const d = Math.floor(seconds / 86400);
  const h = Math.floor((seconds % 86400) / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (d > 0) return `${d}d ${h}h ${m}m`;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
  if (m > 0) return `${m}m ${String(s).padStart(2,'0')}s`;
  return `${s}s`;
}

function fmtBRT(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('pt-BR', {
    timeZone: 'America/Sao_Paulo',
    day:'2-digit', month:'2-digit', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}

function agencyBadge(ag) {
  if (ag === 'Starken') return '<span class="badge badge-starken">⚡ Starken</span>';
  if (ag === 'Fenice Lab') return '<span class="badge badge-fenice">🔥 Fenice</span>';
  return `<span class="badge badge-other">${ag||'—'}</span>`;
}

function escape(str) {
  return (str || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

// Renderiza HERO — o próximo post a publicar
function renderHero(post, client) {
  const remaining = post.scheduled_publish_time - Math.floor(Date.now() / 1000);
  const imminent = remaining > 0 && remaining < 600;
  return `
    <div class="hero">
      <div class="hero-image">
        <img src="${escape(post.image_url || '')}" alt="preview">
      </div>
      <div class="hero-info">
        <div>
          <div class="hero-label">📍 Próxima publicação · ${client.name}</div>
          <div class="hero-title">${escape(client.name)}</div>
          <div class="hero-meta">
            ${agencyBadge(client.agencia)}
            <span>${client.ig_username ? '@' + client.ig_username : 'Page ' + client.page_id}</span>
            <span>📅 ${fmtBRT(post.scheduled_publish_iso)} BRT</span>
          </div>
        </div>
        <div class="hero-countdown ${imminent?'imminent':''}">
          <div class="hero-countdown-label">Tempo até publicação</div>
          <div class="hero-countdown-time" data-target="${post.scheduled_publish_time}">${fmtCountdown(remaining)}</div>
        </div>
        <div class="hero-caption">${escape(post.message_preview)}</div>
        <div class="hero-actions">
          <a class="btn btn-ghost" href="${escape(post.permalink || '#')}" target="_blank">Ver no Facebook ↗</a>
          <span class="channel-tag fb-tag">📘 Facebook</span>
        </div>
      </div>
    </div>
  `;
}

function renderPostCard(post, client, isPast) {
  const remaining = post.scheduled_publish_time - Math.floor(Date.now() / 1000);
  const imminent = remaining > 0 && remaining < 600;
  const published = remaining <= 0;
  let cdClass = '';
  if (published) cdClass = 'published';
  else if (imminent) cdClass = 'imminent';

  return `
    <div class="card ${isPast?'published':''}">
      <div class="card-top">
        <div>
          <div class="card-client">${escape(client.name)}</div>
          <div class="card-handle">${client.ig_username ? '@' + client.ig_username : 'page ' + client.page_id}</div>
        </div>
        ${agencyBadge(client.agencia)}
      </div>
      ${post.image_url ? `<img class="card-image" src="${escape(post.image_url)}" alt="preview">` : ''}
      <div class="card-body">
        <div class="countdown-box ${cdClass}">
          <div class="countdown-label">${published ? 'Publicado em' : 'Tempo até publicação'}</div>
          <div class="countdown-time" data-target="${post.scheduled_publish_time}">${fmtCountdown(remaining)}</div>
        </div>
        <dl class="meta-grid">
          <dt>📅 Quando</dt><dd>${fmtBRT(post.scheduled_publish_iso)} BRT</dd>
          <dt>🆔 Post ID</dt><dd style="font-family:monospace;font-size:11px">${escape(post.id.split('_').pop())}</dd>
        </dl>
        <div class="caption collapsed" id="cap-${post.id}">${escape(post.message_preview)}</div>
        <button class="caption-toggle" onclick="toggleCaption('${post.id}', this)">Ver copy completa ↓</button>
        <div class="card-actions">
          <a class="btn btn-ghost" style="font-size:12px;padding:7px 12px;" href="${escape(post.permalink || '#')}" target="_blank">Ver no Facebook ↗</a>
          <span class="channel-tag fb-tag">📘 Facebook</span>
        </div>
      </div>
    </div>
  `;
}

function renderEmptyClientCard(client) {
  return `
    <div class="card published">
      <div class="card-top">
        <div>
          <div class="card-client">${escape(client.name)}</div>
          <div class="card-handle">${client.ig_username ? '@' + client.ig_username : 'page ' + client.page_id}</div>
        </div>
        ${agencyBadge(client.agencia)}
      </div>
      <div class="card-body">
        <div class="empty-state">Nenhum post agendado</div>
      </div>
    </div>
  `;
}

function renderPublishedCard(p, fmt) {
  const igUrl = p.channels && p.channels.instagram;
  const fbUrl = p.channels && p.channels.facebook;
  return `
    <div class="card card-pub">
      <div class="card-top">
        <div>
          <div class="card-client">${escape(p.client)}</div>
          <div class="card-handle">${p.ig_username ? '@' + p.ig_username : ''}</div>
        </div>
        <div class="cron-badges">${fmt ? formatBadge(fmt) : ''}${channelBadges(postChannels(p))}</div>
      </div>
      ${p.image_url ? `<img class="card-image" src="${escape(p.image_url)}" alt="post" loading="lazy">` : ''}
      <div class="card-body">
        <div class="pub-date">✓ Publicado · ${fmtBRT(p.published_iso)} BRT</div>
        ${p.title ? `<div class="pub-title">${escape(p.title)}</div>` : ''}
        <div class="caption collapsed" id="cap-${p.id}">${escape(p.caption)}</div>
        <button class="caption-toggle" onclick="toggleCaption('${p.id}', this)">Ver copy completa ↓</button>
        ${(igUrl || fbUrl) ? `<div class="pub-links">
          ${igUrl ? `<a class="btn btn-ghost btn-xs" href="${escape(igUrl)}" target="_blank">Instagram ↗</a>` : ''}
          ${fbUrl ? `<a class="btn btn-ghost btn-xs" href="${escape(fbUrl)}" target="_blank">Facebook ↗</a>` : ''}
        </div>` : ''}
      </div>
    </div>
  `;
}

function renderStoryCard(s, fmt) {
  const isStory = !fmt || fmt === 'story';   // feed/carrossel/reel não expiram em 24h
  const pub = new Date(s.published_iso).getTime();
  const exp = pub + 24 * 3600 * 1000;
  const now = Date.now();
  const active = now < exp;
  const remMs = exp - now;
  const remH = Math.floor(remMs / 3600000);
  const remM = Math.floor((remMs % 3600000) / 60000);
  const badge = !isStory
    ? `<span class="story-badge perma">${FORMAT[fmt]?.icon || '✓'} publicado</span>`
    : active
    ? '<span class="story-badge live"><span class="pulse"></span>NO AR</span>'
    : '<span class="story-badge expired">Expirado</span>';
  const statusLine = !isStory
    ? '<div class="story-meta">✓ publicado</div>'
    : active
    ? `<div class="story-meta live-text">⏳ expira em ${remH}h ${remM}m</div>`
    : `<div class="story-meta">⚪ expirou ${fmtBRT(new Date(exp).toISOString())}</div>`;
  const arClass = (fmt === 'feed' || fmt === 'carousel') ? ' media-45' : '';   // feed/carrossel = 4:5, story/reel = 9:16
  const media = s.image_url
    ? `<a class="story-media${arClass}" href="${escape(s.image_url)}" target="_blank" title="Abrir criativo">
         <img src="${escape(s.image_url)}" alt="post" loading="lazy">
         ${badge}<span class="story-ch">${storyChannels(s).map(ch => ch === 'ig' ? '📸' : ch === 'fb' ? '📘' : '').join('')}</span>
       </a>`
    : `<div class="story-media${arClass}">${badge}</div>`;
  return `
    <div class="story-card ${isStory && active ? 'live' : ''}">
      ${media}
      <div class="story-info">
        <div class="story-client">${escape(s.client)}${fmt && fmt !== 'story' ? ' ' + formatBadge(fmt) : ''}</div>
        ${s.title ? `<div class="story-title">${escape(s.title)}</div>` : ''}
        <div class="story-meta">📅 ${fmtBRT(s.published_iso)} BRT</div>
        ${statusLine}
      </div>
    </div>
  `;
}

function renderCron(cron) {
  const isCompleted = cronDone(cron);
  let countdownHtml = '';
  let imminent = false;
  if (cron.next_fire_iso && !isCompleted) {
    const target = Math.floor(new Date(cron.next_fire_iso).getTime() / 1000);
    const remaining = target - Math.floor(Date.now() / 1000);
    imminent = remaining > 0 && remaining < 600;
    const fired = remaining <= 0;
    const cls = isCompleted ? 'completed' : imminent ? 'imminent' : '';
    countdownHtml = `<div class="cron-countdown ${cls}" data-target="${target}">${fmtCountdown(remaining)}</div>`;
  } else if (cron.recurring) {
    countdownHtml = `<div class="cron-countdown" style="background:transparent;font-size:13px;color:var(--text-2);font-weight:500;">${cron.expression}</div>`;
  }

  if (isCompleted) {
    countdownHtml = `<div class="cron-countdown completed">✓ Publicado</div>`;
  }

  const channelTag = channelBadges(cronChannels(cron)) || '<span class="channel-tag postmortem-tag">📋 Postmortem</span>';

  const statusChip = isCompleted ? '<span class="cron-status done">✓ Publicado</span>'
    : imminent ? '<span class="cron-status soon">🔴 Em instantes</span>'
    : '<span class="cron-status pending">⏰ Agendado</span>';

  const whenLabel = cron.next_fire_iso
    ? `📅 ${fmtBRT(cron.next_fire_iso)} BRT`
    : (cron.recurring ? `↻ ${cron.expression} (${cron.tz})` : '');

  const videoUrl = (cronFormat(cron) === 'reel' && cron.video)
    ? `https://central.starkentecnologia.com.br/${cron.client_slug}/assets/videos/${cron.video}`
    : null;
  const thumb = videoUrl
    ? `<video class="cron-thumb cron-video" controls playsinline preload="metadata" src="${escape(videoUrl)}" title="▶ Reproduzir o reel"></video>`
    : cron.image_url
    ? `<a class="cron-thumb" href="${escape(cron.image_url)}" target="_blank" title="Abrir criativo"><img src="${escape(cron.image_url)}" alt="preview" loading="lazy"></a>`
    : `<div class="cron-thumb placeholder">${FORMAT[cronFormat(cron)]?.icon || '📄'}</div>`;

  return `
    <div class="cron-card ${isCompleted?'completed':''} ${imminent?'imminent':''}">
      <div class="cron-inner">
        ${thumb}
        <div class="cron-content">
          <div class="cron-top">
            <div>
              <div class="cron-client">${escape(cron.client)}</div>
              <div class="cron-desc">${escape(cron.description)}</div>
            </div>
            <div class="cron-badges">${formatBadge(cronFormat(cron))}${channelTag}</div>
          </div>
          ${countdownHtml}
          ${whenLabel ? `<div class="cron-when">${whenLabel}</div>` : ''}
          <div class="cron-foot">
            ${statusChip}
            <span class="cron-id">${escape(cron.id)}${cron.session_dependent ? ' · Claude' : ' · VPS'}</span>
          </div>
        </div>
      </div>
    </div>
  `;
}

function toggleCaption(postId, btn) {
  const el = document.getElementById('cap-' + postId);
  if (el.classList.contains('collapsed')) {
    el.classList.remove('collapsed');
    btn.textContent = 'Recolher copy ↑';
  } else {
    el.classList.add('collapsed');
    btn.textContent = 'Ver copy completa ↓';
  }
}

function updateCountdowns() {
  document.querySelectorAll('[data-target]').forEach(el => {
    const target = parseInt(el.dataset.target);
    const remaining = target - Math.floor(Date.now() / 1000);
    el.textContent = fmtCountdown(remaining);
    const box = el.closest('.countdown-box, .hero-countdown, .cron-countdown');
    if (box) {
      box.classList.toggle('imminent', remaining > 0 && remaining < 600);
      box.classList.toggle('published', remaining <= 0);
    }
  });
}

function render() {
  if (!cachedData) return;
  const data = cachedData;
  const clients = data.clients.filter(c => inClient(c.slug));
  const now = Math.floor(Date.now() / 1000);

  // FB scheduled posts (raros — entram em "Agendados")
  const upcomingPosts = [];
  if (inChannel(['fb'])) clients.forEach(client => (client.fb_scheduled_posts || []).forEach(post => {
    if (post.scheduled_publish_time > now) upcomingPosts.push({ post, client });
  }));
  upcomingPosts.sort((a, b) => a.post.scheduled_publish_time - b.post.scheduled_publish_time);

  // Crons (materiais agendados)
  const cronsAll = (data.crons || []).filter(c => inClient(c.client_slug) && inChannel(cronChannels(c)));
  const agCrons = cronsAll.filter(c => showOld || !cronDone(c));
  const fmtCounts = { story: 0, feed: 0, reel: 0, carousel: 0 };
  agCrons.forEach(c => { const k = cronFormat(c); fmtCounts[k] = (fmtCounts[k] || 0) + 1; });
  const cronsShown = agCrons.filter(inFormat).sort((a, b) => new Date(a.next_fire_iso || 0) - new Date(b.next_fire_iso || 0));

  // Publicados
  const publicados = (data.posts_publicados || []).filter(p => inClient(p.client_slug) && inChannel(postChannels(p)));
  const stories = (data.stories_publicados || [])
    .filter(s => inClient(s.client_slug) && inChannel(storyChannels(s)))
    .sort((a, b) => new Date(b.published_iso) - new Date(a.published_iso));

  document.getElementById('vc-ag').textContent = agCrons.length + upcomingPosts.length;
  document.getElementById('vc-pub').textContent = publicados.length + stories.length;
  document.getElementById('format-filters').style.display = '';   // filtro de formato vale nas duas views

  let html = '';
  if (currentView === 'agendados') {
    html += `<div class="fmt-summary">${fmtChip('story', fmtCounts.story)}${fmtChip('feed', fmtCounts.feed)}${fmtChip('reel', fmtCounts.reel)}${fmtChip('carousel', fmtCounts.carousel)}</div>`;
    if (upcomingPosts.length) {
      html += renderHero(upcomingPosts[0].post, upcomingPosts[0].client);
      html += '<div class="section"><div class="section-header"><div class="section-title">📘 Agendados no Facebook (nativo)</div><div class="section-count">' + upcomingPosts.length + '</div></div><div class="grid">';
      upcomingPosts.forEach(({ post, client }) => { html += renderPostCard(post, client, false); });
      html += '</div></div>';
    }
    html += '<div class="section"><div class="section-header"><div class="section-title">📅 Materiais Agendados</div><div class="section-count">' + cronsShown.length + (currentFormat !== 'all' ? ' · ' + FORMAT[currentFormat].label : '') + '</div></div>';
    if (cronsShown.length) { html += '<div class="cron-grid">'; cronsShown.forEach(c => { html += renderCron(c); }); html += '</div>'; }
    else html += '<div class="empty-state">Nenhum material agendado neste filtro</div>';
    html += '</div>';
  } else {
    // Formato real de cada material publicado: campo kind > join por id no cron > heurística do id/título
    const kindById = {}; (data.crons || []).forEach(c => { kindById[c.id] = c.kind || 'story'; });
    const guessFmt = (id, title) => { const t = ((id || '') + ' ' + (title || '')).toLowerCase(); if (/reel/.test(t)) return 'reel'; if (/carrossel|carousel/.test(t)) return 'carousel'; if (/feed/.test(t)) return 'feed'; return null; };
    const fmtOf = (item, fallback) => item.kind || kindById[item.id] || guessFmt(item.id, item.title) || fallback;

    // Itens unificados: posts curados (renderer pub) + stories auto-registrados (renderer story)
    const items = [
      ...publicados.map(p => ({ rec: p, fmt: fmtOf(p, 'feed'), src: 'post', when: p.published_iso })),
      ...stories.map(s => ({ rec: s, fmt: fmtOf(s, 'story'), src: 'story', when: s.published_iso })),
    ];
    const counts = { story: 0, feed: 0, reel: 0, carousel: 0 };
    items.forEach(i => { counts[i.fmt] = (counts[i.fmt] || 0) + 1; });
    const shown = items.filter(i => currentFormat === 'all' || i.fmt === currentFormat);
    const postItems = shown.filter(i => i.fmt !== 'story').sort((a, b) => new Date(b.when) - new Date(a.when));
    const storyItems = shown.filter(i => i.fmt === 'story').sort((a, b) => new Date(b.when) - new Date(a.when));

    html += `<div class="fmt-summary">${fmtChip('story', counts.story)}${fmtChip('feed', counts.feed)}${fmtChip('reel', counts.reel)}${fmtChip('carousel', counts.carousel)}</div>`;

    if (postItems.length) {
      html += '<div class="section"><div class="section-header"><div class="section-title">🚀 Posts Publicados</div><div class="section-count">' + postItems.length + ' post' + (postItems.length !== 1 ? 's' : '') + (currentFormat !== 'all' ? ' · ' + FORMAT[currentFormat].label : '') + '</div></div>';
      const cardsPub = postItems.filter(i => i.src === 'post');
      const cardsStory = postItems.filter(i => i.src === 'story');
      if (cardsPub.length) { html += '<div class="grid grid-pub">'; cardsPub.forEach(i => { html += renderPublishedCard(i.rec, i.fmt); }); html += '</div>'; }
      if (cardsStory.length) { html += '<div class="stories-grid">'; cardsStory.forEach(i => { html += renderStoryCard(i.rec, i.fmt); }); html += '</div>'; }
      html += '</div>';
    }
    if (storyItems.length) {
      const noAr = storyItems.filter(i => Date.now() < new Date(i.when).getTime() + 24 * 3600 * 1000).length;
      html += '<div class="section"><div class="section-header"><div class="section-title">📱 Stories Publicados</div><div class="section-count">' + noAr + ' no ar · ' + storyItems.length + ' total</div></div><div class="stories-grid">';
      storyItems.forEach(i => { html += renderStoryCard(i.rec, 'story'); });
      html += '</div></div>';
    }
    if (!shown.length) html += '<div class="empty-state">Nada publicado neste filtro</div>';
  }

  document.getElementById('content').innerHTML = html;
  updateCountdowns();
}

async function loadData(force = false) {
  try {
    const url = force ? '/api/agendamentos?force=1' : '/api/agendamentos';
    const res = await fetch(url);
    const data = await res.json();
    cachedData = data;
    buildClientFilters(data.clients);

    // Token status
    const t = document.getElementById('token-status');
    if (data.token_status === 'valid') {
      t.className = 'pill ok';
      t.textContent = `✓ Token OK · ${data.token_info?.name || 'user'}`;
    } else if (data.error === 'token_not_found') {
      t.className = 'pill err';
      t.textContent = '✗ Token não preenchido';
    } else {
      t.className = 'pill err';
      t.textContent = '✗ Token expirado';
    }

    document.getElementById('updated-at').textContent = `🕐 ${fmtBRT(data.updated_at)}`;
    document.getElementById('last-check').textContent = new Date().toLocaleTimeString('pt-BR');

    render();
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="loading">Erro: ${err.message}</div>`;
    console.error(err);
  }
}

// Constrói os botões de cliente dinamicamente (uma vez), na ordem do mapping
function buildClientFilters(clients) {
  if (clientFiltersBuilt) return;
  const wrap = document.getElementById('client-filters');
  (clients || []).forEach(c => {
    const b = document.createElement('button');
    b.className = 'filter-btn';
    b.dataset.client = c.slug;
    b.textContent = c.name;
    wrap.appendChild(b);
  });
  clientFiltersBuilt = true;
}

// Filtros (delegação — botões de cliente são dinâmicos)
document.addEventListener('click', (e) => {
  const vt = e.target.closest('[data-view]');
  if (vt) {
    document.querySelectorAll('[data-view]').forEach(x => x.classList.remove('active'));
    vt.classList.add('active');
    currentView = vt.dataset.view;
    render();
    return;
  }
  const ff = e.target.closest('[data-format]');
  if (ff) {
    document.querySelectorAll('[data-format]').forEach(x => x.classList.remove('active'));
    ff.classList.add('active');
    currentFormat = ff.dataset.format;
    render();
    return;
  }
  const cb = e.target.closest('[data-client]');
  if (cb) {
    document.querySelectorAll('[data-client]').forEach(x => x.classList.remove('active'));
    cb.classList.add('active');
    currentClient = cb.dataset.client;
    render();
    return;
  }
  const ch = e.target.closest('[data-channel]');
  if (ch) {
    document.querySelectorAll('[data-channel]').forEach(x => x.classList.remove('active'));
    ch.classList.add('active');
    currentChannel = ch.dataset.channel;
    render();
  }
});

// Show old toggle
document.getElementById('show-old').addEventListener('change', (e) => {
  showOld = e.target.checked;
  render();
});

loadData();
setInterval(() => loadData(false), REFRESH_MS);
setInterval(updateCountdowns, 1000);
</script>
